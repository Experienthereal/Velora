[package]
name = "velora-lang"
version = "0.1.0"
authors = ["Velora Contributors"]
edition = "2026"
description = "The Velora Programming Language — C++ speed. Python simplicity."
license = "MIT"
homepage = "https://velora.dev"
repository = "https://github.com/velora-lang/velora"

[compiler]
source = "compiler/"
entry = "compiler/main.cpp"

[veloragame]
runtime = "veloragame/"
backend = "Auto"
vsync = true
target_fps = 60

[stdlib]
path = "stdlib/"

[dependencies]

[build]
output = "velora"
target = "x86_64-windows"
optimize = true
strip_debug = false

[dev]
examples = "examples/"
tests = "tests/"
